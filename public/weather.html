<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 20px;
    }
    .back-link:hover { color: #fff; }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 1.6rem;
      margin-bottom: 25px;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-box input:focus {
      border-color: #667eea;
    }
    .search-box button {
      padding: 12px 24px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .search-box button:hover { background: #5a6fd6; }
    .search-box button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      color: #888;
      padding: 30px 0;
      display: none;
    }
    .error {
      text-align: center;
      color: #e74c3c;
      padding: 15px;
      background: #fde8e8;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
    }
    .weather-result { display: none; }
    .weather-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .weather-header .city {
      font-size: 1.3rem;
      color: #333;
      font-weight: 600;
    }
    .weather-header .country {
      color: #888;
      font-size: 0.9rem;
    }
    .weather-main {
      text-align: center;
      padding: 20px 0;
    }
    .weather-main .temp {
      font-size: 4rem;
      font-weight: 700;
      color: #333;
    }
    .weather-main .temp::after {
      content: "°C";
      font-size: 1.5rem;
      font-weight: 400;
    }
    .weather-main .desc {
      font-size: 1.2rem;
      color: #666;
      margin-top: 5px;
    }
    .weather-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .detail-item {
      background: #f5f7ff;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    .detail-item .label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
    }
    .detail-item .value {
      font-size: 1.1rem;
      color: #333;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← 返回首页</a>
    <div class="card">
      <h1>🌤️ 天气查询</h1>

      <div class="search-box">
        <input type="text" id="cityInput" placeholder="输入城市名，如：北京、London" />
        <button id="searchBtn">查询</button>
      </div>

      <div class="loading" id="loading">查询中...</div>
      <div class="error" id="error"></div>

      <div class="weather-result" id="weatherResult">
        <div class="weather-header">
          <div class="city" id="cityName"></div>
          <div class="country" id="countryName"></div>
        </div>
        <div class="weather-main">
          <div class="temp" id="temperature"></div>
          <div class="desc" id="weatherDesc"></div>
        </div>
        <div class="weather-details">
          <div class="detail-item">
            <div class="label">体感温度</div>
            <div class="value" id="feelsLike">-</div>
          </div>
          <div class="detail-item">
            <div class="label">湿度</div>
            <div class="value" id="humidity">-</div>
          </div>
          <div class="detail-item">
            <div class="label">风速</div>
            <div class="value" id="windSpeed">-</div>
          </div>
          <div class="detail-item">
            <div class="label">能见度</div>
            <div class="value" id="visibility">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const weatherResult = document.getElementById('weatherResult');

    async function searchWeather() {
      const city = cityInput.value.trim();
      if (!city) {
        showError('请输入城市名称');
        return;
      }

      hideError();
      loading.style.display = 'block';
      weatherResult.style.display = 'none';
      searchBtn.disabled = true;

      try {
        const res = await fetch(`/api/weather/${encodeURIComponent(city)}`);
        const data = await res.json();

        if (!data.success) {
          showError(data.error);
          return;
        }

        const w = data.data;
        document.getElementById('cityName').textContent = w.city;
        document.getElementById('countryName').textContent = w.country;
        document.getElementById('temperature').textContent = w.temperature;
        document.getElementById('weatherDesc').textContent = w.weatherDesc;
        document.getElementById('feelsLike').textContent = w.feelsLike + '°C';
        document.getElementById('humidity').textContent = w.humidity + '%';
        document.getElementById('windSpeed').textContent = w.windSpeed + ' km/h';
        document.getElementById('visibility').textContent = w.visibility + ' km';

        weatherResult.style.display = 'block';
      } catch (err) {
        showError('网络错误，请检查网络连接');
      } finally {
        loading.style.display = 'none';
        searchBtn.disabled = false;
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.style.display = 'block';
    }

    function hideError() {
      error.style.display = 'none';
    }

    searchBtn.addEventListener('click', searchWeather);
    cityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchWeather();
    });
  </script>
</body>
</html>
