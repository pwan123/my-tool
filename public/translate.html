<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 20px;
    }
    .back-link:hover { color: #fff; }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 1.6rem;
      margin-bottom: 25px;
    }
    .lang-selector {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }
    .lang-selector select {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      transition: border-color 0.3s;
    }
    .lang-selector select:focus {
      border-color: #667eea;
    }
    .swap-btn {
      padding: 8px 12px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.3s;
    }
    .swap-btn:hover { background: #e0e0e0; }
    textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.3s;
    }
    textarea:focus {
      border-color: #667eea;
    }
    .translate-btn-wrap {
      text-align: center;
      margin: 15px 0;
    }
    .translate-btn {
      padding: 12px 40px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .translate-btn:hover { background: #5a6fd6; }
    .translate-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .result-area {
      position: relative;
    }
    .result-area textarea {
      background: #f5f7ff;
      min-height: 80px;
    }
    .copy-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 6px 14px;
      background: rgba(102,126,234,0.15);
      color: #667eea;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .copy-btn:hover { background: rgba(102,126,234,0.25); }
    .loading {
      text-align: center;
      color: #888;
      padding: 15px 0;
      display: none;
    }
    .error {
      text-align: center;
      color: #e74c3c;
      padding: 12px;
      background: #fde8e8;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← 返回首页</a>
    <div class="card">
      <h1>🌐 翻译工具</h1>

      <div class="error" id="error"></div>

      <div class="lang-selector">
        <select id="sourceLang">
          <option value="auto">自动检测</option>
          <option value="en">英语</option>
          <option value="zh-CN" selected>中文（简体）</option>
          <option value="zh-TW">中文（繁体）</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="ar">阿拉伯语</option>
          <option value="pt">葡萄牙语</option>
          <option value="it">意大利语</option>
        </select>

        <button class="swap-btn" id="swapBtn" title="交换语言">⇄</button>

        <select id="targetLang">
          <option value="en">英语</option>
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW">中文（繁体）</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
          <option value="ar">阿拉伯语</option>
          <option value="pt">葡萄牙语</option>
          <option value="it">意大利语</option>
        </select>
      </div>

      <textarea id="sourceText" placeholder="请输入要翻译的文本"></textarea>

      <div class="loading" id="loading">翻译中...</div>

      <div class="translate-btn-wrap">
        <button class="translate-btn" id="translateBtn">翻译</button>
      </div>

      <div class="result-area">
        <textarea id="resultText" placeholder="翻译结果" readonly></textarea>
        <button class="copy-btn" id="copyBtn">复制结果</button>
      </div>
    </div>
  </div>

  <script>
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const sourceText = document.getElementById('sourceText');
    const resultText = document.getElementById('resultText');
    const translateBtn = document.getElementById('translateBtn');
    const swapBtn = document.getElementById('swapBtn');
    const copyBtn = document.getElementById('copyBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    async function translate() {
      const text = sourceText.value.trim();
      if (!text) {
        showError('请输入待翻译的文本');
        return;
      }

      hideError();
      loading.style.display = 'block';
      translateBtn.disabled = true;

      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            q: text,
            source: sourceLang.value,
            target: targetLang.value,
          }),
        });

        const data = await res.json();
        console.log(data)

        if (!data.success) {
          showError(data.error);
          return;
        }

        resultText.value = data.data.translatedText;
      } catch (err) {
        showError('网络错误，请检查网络连接');
      } finally {
        loading.style.display = 'none';
        translateBtn.disabled = false;
      }
    }

    function swapLanguage() {
      // 如果源语言是 auto，不允许交换
      if (sourceLang.value === 'auto') return;

      const tmp = sourceLang.value;
      sourceLang.value = targetLang.value;
      targetLang.value = tmp;

      const tmpText = sourceText.value;
      sourceText.value = resultText.value;
      resultText.value = tmpText;
    }

    function showError(msg) {
      error.textContent = msg;
      error.style.display = 'block';
    }

    function hideError() {
      error.style.display = 'none';
    }

    translateBtn.addEventListener('click', translate);
    swapBtn.addEventListener('click', swapLanguage);

    sourceText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) translate();
    });

    copyBtn.addEventListener('click', async () => {
      if (!resultText.value) return;
      try {
        await navigator.clipboard.writeText(resultText.value);
        copyBtn.textContent = '已复制！';
        setTimeout(() => { copyBtn.textContent = '复制结果'; }, 2000);
      } catch {
        copyBtn.textContent = '复制失败';
        setTimeout(() => { copyBtn.textContent = '复制结果'; }, 2000);
      }
    });
  </script>
</body>
</html>
