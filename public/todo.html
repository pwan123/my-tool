<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      max-width: 550px;
      margin: 0 auto;
    }
    .back-link {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-block;
      margin-bottom: 20px;
    }
    .back-link:hover { color: #fff; }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 1.6rem;
      margin-bottom: 25px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-row input:focus {
      border-color: #667eea;
    }
    .input-row button {
      padding: 12px 24px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .input-row button:hover { background: #5a6fd6; }
    .input-row button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      color: #888;
      padding: 20px 0;
    }
    .error {
      text-align: center;
      color: #e74c3c;
      padding: 12px;
      background: #fde8e8;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
    }
    .empty-tip {
      text-align: center;
      color: #aaa;
      padding: 30px 0;
      font-size: 0.95rem;
    }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
      flex-shrink: 0;
    }
    .todo-item .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-word;
    }
    .todo-item .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .todo-item .todo-time {
      font-size: 0.8rem;
      color: #bbb;
      flex-shrink: 0;
    }
    .todo-item .delete-btn {
      padding: 6px 12px;
      background: #fee;
      color: #e74c3c;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .todo-item .delete-btn:hover { background: #fdd; }
    .stats {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← 返回首页</a>
    <div class="card">
      <h1>📋 待办事项</h1>

      <div class="error" id="error"></div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="输入待办事项，按 Enter 添加" />
        <button id="addBtn">添加</button>
      </div>

      <div class="loading" id="loading">加载中...</div>

      <div class="empty-tip" id="emptyTip">还没有待办事项，添加一个吧！</div>

      <ul class="todo-list" id="todoList"></ul>

      <div class="stats" id="stats"></div>
    </div>
  </div>

  <script>
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const emptyTip = document.getElementById('emptyTip');
    const stats = document.getElementById('stats');

    const API = '/api/todo/todos';

    async function loadTodos() {
      loading.style.display = 'block';
      try {
        const res = await fetch(API);
        const data = await res.json();
        renderTodos(data);
      } catch (err) {
        showError('加载失败，请检查网络连接');
      } finally {
        loading.style.display = 'none';
      }
    }

    function renderTodos(todos) {
      todoList.innerHTML = '';

      if (todos.length === 0) {
        emptyTip.style.display = 'block';
        stats.textContent = '';
        return;
      }

      emptyTip.style.display = 'none';

      const doneCount = todos.filter(t => t.done).length;
      stats.textContent = `共 ${todos.length} 项，已完成 ${doneCount} 项`;

      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.dataset.id = todo.id;

        const time = todo.id ? new Date(todo.id).toLocaleString('zh-CN', {
          month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        }) : '';

        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} />
          <span class="todo-text ${todo.done ? 'done' : ''}">${escapeHtml(todo.text)}</span>
          <span class="todo-time">${time}</span>
          <button class="delete-btn">删除</button>
        `;

        const checkbox = li.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', () => toggleTodo(todo.id));

        const delBtn = li.querySelector('.delete-btn');
        delBtn.addEventListener('click', () => deleteTodo(todo.id));

        todoList.appendChild(li);
      });
    }

    async function addTodo() {
      const text = todoInput.value.trim();
      if (!text) {
        showError('请输入待办内容');
        return;
      }

      hideError();
      addBtn.disabled = true;

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        if (!res.ok) {
          showError('添加失败，请重试');
          return;
        }

        todoInput.value = '';
        await loadTodos();
      } catch (err) {
        showError('网络错误，请检查网络连接');
      } finally {
        addBtn.disabled = false;
      }
    }

    async function toggleTodo(id) {
      try {
        await fetch(`${API}/${id}`, { method: 'PATCH' });
        await loadTodos();
      } catch (err) {
        showError('操作失败，请重试');
      }
    }

    async function deleteTodo(id) {
      try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        await loadTodos();
      } catch (err) {
        showError('删除失败，请重试');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(msg) {
      error.textContent = msg;
      error.style.display = 'block';
    }

    function hideError() {
      error.style.display = 'none';
    }

    addBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    // 初始加载
    loadTodos();
  </script>
</body>
</html>
