<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .subtitle {
      color: rgba(255,255,255,0.8);
      margin-bottom: 40px;
      font-size: 1.1rem;
    }
    .cards {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 40px 35px;
      width: 280px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .card-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 10px;
    }
    .card p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .footer {
      margin-top: 50px;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>我的工具箱</h1>
    <p class="subtitle">实用小工具，即开即用</p>

    <div class="cards">
      <a class="card" href="weather.html">
        <div class="card-icon">🌤️</div>
        <h2>天气查询</h2>
        <p>查询全球城市实时天气<br>温度、湿度、风速一目了然</p>
      </a>

      <a class="card" href="translate.html">
        <div class="card-icon">🌐</div>
        <h2>翻译工具</h2>
        <p>多语言文本互译<br>支持 10+ 种语言</p>
      </a>

      <a class="card" href="todo.html">
        <div class="card-icon">📋</div>
        <h2>待办事项</h2>
        <p>管理日常待办清单<br>添加、完成、删除一键操作</p>
      </a>
    </div>

    <p class="footer">数据来源：wttr.in & MyMemory API</p>
  </div>
</body>
</html>
